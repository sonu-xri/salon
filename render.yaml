# Blueprint: https://render.com/docs/blueprint-spec
# Deploy: connect this repo in Render → New Blueprint Instance, or create Web Service manually.

databases:
  - name: salon1-db
    databaseName: salon1
    user: salon1
    plan: free

services:
  - type: web
    name: salon1-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn salon1.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salon1-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "1"
